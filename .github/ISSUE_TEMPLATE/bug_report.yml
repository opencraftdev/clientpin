name: Bug report
description: Report something that is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For security vulnerabilities,
        do **not** use this form — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app (dashboard / onboarding / landing)
        - Browser extension
        - Database / backend
        - Not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser + version, OS, and the commit or deployment URL if known.
      placeholder: "Chrome 130, macOS 15, commit abc1234"
    validations:
      required: false
